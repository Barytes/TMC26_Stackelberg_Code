[script]
name = "run_stage1_price_heatmaps.py"
entry = "scripts/run_stage1_price_heatmaps.py"

[run]
command = "uv run python scripts/run_stage1_price_heatmaps.py --config configs/default.toml --pEmax 15 --pNmax 15 --pE-points 150 --pN-points 150 --stage2-method DG --eps-tol 1e-12"

[inputs]
config = "configs/default.toml"
pEmax = 15.0
pNmax = 15.0
pE_points = 150
pN_points = 150
stage2_method = "DG"
seed = 2026
eps_tol = 1e-12
show_progress = true
progress_step = 100

[outputs]
dir = "outputs/run_stage1_price_heatmaps_20260309_113102"
files = [
  "esp_revenue_heatmap.png",
  "nsp_revenue_heatmap.png",
  "joint_revenue_heatmap.png",
  "eps_heatmap.png",
  "price_grid_metrics.csv",
  "summary.txt",
]

